<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quên mật khẩu</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* NỀN */
body {
    height: 100vh;
    background: radial-gradient(circle at top left, #020024, #000000 70%);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORM BOX */
.container {
    background: #121a3a;
    padding: 40px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    text-align: center;
}

/* TITLE */
.container h2 {
    color: white;
    margin-bottom: 25px;
}

/* INPUT */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1f2a5a;
    color: white;
    font-size: 15px;
}

input::placeholder {
    color: #aaa;
}

/* ICON MẮT */
.toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(to right, #2b5cff, #3c8cff);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* TEXT */
p {
    color: #ccc;
    margin-top: 15px;
}

a {
    color: #3c8cff;
    text-decoration: none;
}

/* MESSAGE */
.error {
    color: red;
    margin-bottom: 10px;
}
.success {
    color: lightgreen;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="container">
    <h2>Quên Mật Khẩu</h2>

    <div id="message"></div>

    <form id="form">
        <div class="input-group">
            <input type="email" name="email" placeholder="Nhập email" required>
        </div>

        <div class="input-group">
            <input type="password" id="pass" placeholder="Mật khẩu mới" required>
            <span class="toggle" onclick="togglePass('pass')">👁</span>
        </div>

        <div class="input-group">
            <input type="password" id="repass" placeholder="Nhập lại mật khẩu" required>
            <span class="toggle" onclick="togglePass('repass')">👁</span>
        </div>

        <button type="submit">Đặt lại mật khẩu</button>
    </form>

    <p>Đã nhớ mật khẩu? <a href="#">Đăng nhập</a></p>
</div>

<script>
// HIỆN/ẨN PASSWORD
function togglePass(id) {
    let input = document.getElementById(id);
    input.type = (input.type === "password") ? "text" : "password";
}

// VALIDATE + FAKE SUBMIT
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let pass = document.getElementById("pass").value;
    let repass = document.getElementById("repass").value;
    let msg = document.getElementById("message");

    if (pass === "" || repass === "") {
        msg.innerHTML = "<div class='error'>Không được để trống!</div>";
        return;
    }

    if (pass !== repass) {
        msg.innerHTML = "<div class='error'>Mật khẩu không khớp!</div>";
        return;
    }

    msg.innerHTML = "<div class='success'>Đặt lại mật khẩu thành công!</div>";
});
</script>

</body>
</html>
